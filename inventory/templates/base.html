{% load static %}

<!DOCTYPE html>

<html>
<head>
    <title>Inventory System</title>

```
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome Icons (for dashboard icons) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Custom CSS -->
<link href="{% static 'css/main.css' %}" rel="stylesheet">
```

</head>
<body>

{% if user.is_authenticated %}

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

```
    <!-- Logo -->
    <a class="navbar-brand fw-bold" href="{% url 'inventory:dashboard' %}">
        <i class="fa-solid fa-box"></i> Inventory
    </a>

    <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">

            <li class="nav-item">
                <a class="nav-link" href="{% url 'inventory:asset_list' %}">
                    <i class="fa-solid fa-laptop"></i> Assets
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'inventory:stock_list' %}">
                    <i class="fa-solid fa-warehouse"></i> Stock
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'inventory:maintenance_list' %}">
                    <i class="fa-solid fa-screwdriver-wrench"></i> Maintenance
                </a>
            </li>

        </ul>

        <!-- Username -->
        <span class="navbar-text text-white me-3">
            <i class="fa-solid fa-user"></i> {{ user.username }}
        </span>

        <!-- Logout -->
        <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button class="btn btn-outline-light btn-sm">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </form>

    </div>
</div>
```

</nav>
{% endif %}

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
