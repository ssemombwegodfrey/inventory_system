{% extends "inventory/base.html" %}
{% block content %}

<div class="card shadow">
  <div class="card-body">
    <h3 class="mb-3">Delete Asset</h3>

    <p>Are you sure you want to delete the asset <strong>{{ asset.name }}</strong> (Tag: {{ asset.tag }})?</p>

    <form method="post">
      {% csrf_token %}
      <a href="{% url 'inventory:asset_list' %}" class="btn btn-secondary">
        Cancel
      </a>
      <button type="submit" class="btn btn-danger">
        Confirm Delete
      </button>
    </form>
  </div>
</div>

{% endblock %}
