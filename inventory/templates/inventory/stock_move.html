{% extends "inventory/base.html" %}
{% block content %}
<div class="card shadow">
    <div class="card-body">
        <h1 class="mb-3">Stock Movement</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button class="btn btn-success" type="submit">Submit</button>
            <a class="btn btn-secondary" href="{% url 'inventory:stock_list' %}">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
